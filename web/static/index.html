<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highway7</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #1e293b; padding: 2rem; border-radius: 8px; width: 320px; }
.login-box h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #f1f5f9; }
.login-box input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 4px; color: #e2e8f0; font-size: 0.9rem; }
.login-box button { width: 100%; padding: 0.5rem; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
.login-box button:hover { background: #2563eb; }

.app { display: none; }
.topbar { background: #1e293b; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
.topbar h1 { font-size: 1.1rem; }
.topbar .info { font-size: 0.8rem; color: #94a3b8; }
.topbar button { background: #334155; color: #e2e8f0; border: none; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

.tabs { display: flex; background: #1e293b; border-bottom: 1px solid #334155; padding: 0 1rem; }
.tab { padding: 0.6rem 1rem; cursor: pointer; color: #94a3b8; font-size: 0.85rem; border-bottom: 2px solid transparent; }
.tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

.content { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

.card { background: #1e293b; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.card h3 { font-size: 0.95rem; margin-bottom: 0.75rem; color: #f1f5f9; }

table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { text-align: left; padding: 0.5rem; color: #94a3b8; border-bottom: 1px solid #334155; font-weight: 500; }
td { padding: 0.5rem; border-bottom: 1px solid #1e293b; }
.badge { padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem; }
.badge-green { background: #065f46; color: #6ee7b7; }
.badge-red { background: #7f1d1d; color: #fca5a5; }
.badge-gray { background: #334155; color: #94a3b8; }

.btn { padding: 0.3rem 0.7rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
.btn-blue { background: #3b82f6; color: white; }
.btn-red { background: #ef4444; color: white; }
.btn-green { background: #10b981; color: white; }
.btn-sm { padding: 0.2rem 0.5rem; font-size: 0.75rem; }

.form-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
.form-row input, .form-row select { padding: 0.4rem; background: #0f172a; border: 1px solid #334155; border-radius: 4px; color: #e2e8f0; font-size: 0.85rem; }
.form-row input { flex: 1; min-width: 120px; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
.stat-card { background: #1e293b; border-radius: 8px; padding: 1rem; text-align: center; }
.stat-card .num { font-size: 1.5rem; font-weight: 700; color: #3b82f6; }
.stat-card .label { font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem; }

.msg { padding: 0.5rem; margin: 0.5rem 0; border-radius: 4px; font-size: 0.85rem; }
.msg-ok { background: #065f46; color: #6ee7b7; }
.msg-err { background: #7f1d1d; color: #fca5a5; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>🛣️ Highway7</h1>
    <p style="color:#94a3b8;font-size:0.8rem;margin-bottom:1rem;">AI出海基础设施管理面板</p>
    <input type="password" id="passInput" placeholder="管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登录</button>
    <div id="loginMsg"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="topbar">
    <h1>🛣️ Highway7</h1>
    <div>
      <span class="info" id="verInfo"></span>
      <button onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">概览</div>
    <div class="tab" data-tab="servers" onclick="switchTab('servers')">落地机</div>
    <div class="tab" data-tab="forwards" onclick="switchTab('forwards')">转发规则</div>
    <div class="tab" data-tab="ss" onclick="switchTab('ss')">SS节点</div>
  </div>

  <div class="content">
    <!-- Dashboard -->
    <div class="panel active" id="panel-dashboard">
      <div class="stats">
        <div class="stat-card"><div class="num" id="statServers">-</div><div class="label">落地机</div></div>
        <div class="stat-card"><div class="num" id="statForwards">-</div><div class="label">转发规则</div></div>
        <div class="stat-card"><div class="num" id="statSS">-</div><div class="label">SS节点</div></div>
      </div>
      <div class="card">
        <h3>NAT规则 (本机)</h3>
        <pre id="natRules" style="font-size:0.8rem;color:#94a3b8;white-space:pre-wrap;">加载中...</pre>
      </div>
    </div>

    <!-- Servers -->
    <div class="panel" id="panel-servers">
      <div class="card">
        <h3>添加落地机</h3>
        <div class="form-row">
          <input id="srvName" placeholder="名称 (如: 美国落地)">
          <input id="srvHost" placeholder="IP地址">
          <input id="srvPort" placeholder="SSH端口" value="22" style="width:80px;flex:none;">
          <select id="srvAuthType" style="flex:none;">
            <option value="key">SSH Key</option>
            <option value="password">密码</option>
          </select>
        </div>
        <div class="form-row">
          <input id="srvAuth" placeholder="Key路径 或 密码">
          <select id="srvRole" style="flex:none;">
            <option value="landing">落地机</option>
            <option value="relay">中继机</option>
          </select>
          <button class="btn btn-blue" onclick="addServer()">添加</button>
        </div>
        <div id="srvMsg"></div>
      </div>
      <div class="card">
        <h3>服务器列表</h3>
        <table>
          <thead><tr><th>名称</th><th>IP</th><th>角色</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="serverList"></tbody>
        </table>
      </div>
    </div>

    <!-- Forwards -->
    <div class="panel" id="panel-forwards">
      <div class="card">
        <h3>添加转发规则</h3>
        <div class="form-row">
          <input id="fwdName" placeholder="名称">
          <input id="fwdListenPort" placeholder="监听端口" style="width:100px;flex:none;">
          <input id="fwdTargetHost" placeholder="目标IP">
          <input id="fwdTargetPort" placeholder="目标端口" style="width:100px;flex:none;">
          <button class="btn btn-blue" onclick="addForward()">添加</button>
        </div>
        <div id="fwdMsg"></div>
      </div>
      <div class="card">
        <h3>转发列表</h3>
        <table>
          <thead><tr><th>名称</th><th>监听端口</th><th>目标</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="forwardList"></tbody>
        </table>
      </div>
    </div>

    <!-- SS -->
    <div class="panel" id="panel-ss">
      <div class="card">
        <h3>部署SS节点 (method=none)</h3>
        <div class="form-row">
          <select id="ssServer"><option value="">选择落地机...</option></select>
          <input id="ssPort" placeholder="端口" style="width:100px;flex:none;">
          <input id="ssPass" placeholder="密码">
          <button class="btn btn-green" onclick="deploySSNode()">部署</button>
        </div>
        <div id="ssMsg"></div>
      </div>
      <div class="card">
        <h3>SS节点列表</h3>
        <table>
          <thead><tr><th>落地机</th><th>端口</th><th>加密</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="ssList"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('h7_token') || '';

// API helper
async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': TOKEN, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  const data = await res.json();
  if (res.status === 401) { doLogout(); throw new Error('unauthorized'); }
  if (!res.ok) throw new Error(data.error || 'request failed');
  return data;
}

// Auth
async function doLogin() {
  const pass = document.getElementById('passInput').value;
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if (!res.ok) { showMsg('loginMsg', data.error, true); return; }
    TOKEN = data.token;
    localStorage.setItem('h7_token', TOKEN);
    showApp();
  } catch (e) { showMsg('loginMsg', '连接失败', true); }
}

function doLogout() {
  TOKEN = '';
  localStorage.removeItem('h7_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
}

async function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadDashboard();
  await loadServers();
  await loadForwards();
  await loadSSNodes();
}

// Tabs
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
}

// Dashboard
async function loadDashboard() {
  try {
    const data = await api('GET', '/status');
    document.getElementById('verInfo').textContent = 'v' + data.version;
    document.getElementById('statServers').textContent = data.servers;
    document.getElementById('statForwards').textContent = data.forwards;
    document.getElementById('statSS').textContent = data.ss_nodes;
  } catch (e) {}
}

// Servers
async function loadServers() {
  try {
    const data = await api('GET', '/servers');
    const tbody = document.getElementById('serverList');
    tbody.innerHTML = data.map(s => `<tr>
      <td>${esc(s.name)}</td><td>${esc(s.host)}:${s.port}</td>
      <td>${s.role}</td>
      <td><span class="badge ${s.status==='online'?'badge-green':'badge-gray'}">${s.status}</span></td>
      <td><button class="btn btn-blue btn-sm" onclick="testServer(${s.id})">测试</button> <button class="btn btn-red btn-sm" onclick="delServer(${s.id})">删除</button></td>
    </tr>`).join('');
    // Update SS server selector
    const sel = document.getElementById('ssServer');
    sel.innerHTML = '<option value="">选择落地机...</option>' +
      data.filter(s => s.role === 'landing').map(s => `<option value="${s.id}">${esc(s.name)} (${esc(s.host)})</option>`).join('');
  } catch (e) {}
}

async function addServer() {
  try {
    await api('POST', '/servers', {
      name: document.getElementById('srvName').value,
      host: document.getElementById('srvHost').value,
      port: parseInt(document.getElementById('srvPort').value) || 22,
      user: 'root',
      auth_type: document.getElementById('srvAuthType').value,
      auth_value: document.getElementById('srvAuth').value,
      role: document.getElementById('srvRole').value,
    });
    showMsg('srvMsg', '添加成功');
    await loadServers();
    await loadDashboard();
  } catch (e) { showMsg('srvMsg', e.message, true); }
}

async function delServer(id) {
  if (!confirm('确认删除?')) return;
  try { await api('DELETE', '/servers/' + id); await loadServers(); await loadDashboard(); } catch (e) { alert(e.message); }
}

async function testServer(id) {
  try {
    const data = await api('POST', '/servers/' + id + '/test');
    showMsg('srvMsg', data.status + ': ' + (data.message || data.error));
    await loadServers();
  } catch (e) { showMsg('srvMsg', e.message, true); }
}

// Forwards
async function loadForwards() {
  try {
    const data = await api('GET', '/forwards');
    const tbody = document.getElementById('forwardList');
    tbody.innerHTML = data.map(f => `<tr>
      <td>${esc(f.name)}</td><td>${f.listen_port}</td>
      <td>${esc(f.target_host)}:${f.target_port}</td>
      <td><span class="badge ${f.status==='active'?'badge-green':'badge-gray'}">${f.status}</span></td>
      <td><button class="btn ${f.status==='active'?'btn-red':'btn-green'} btn-sm" onclick="toggleForward(${f.id})">${f.status==='active'?'停用':'激活'}</button> <button class="btn btn-red btn-sm" onclick="delForward(${f.id})">删除</button></td>
    </tr>`).join('');
  } catch (e) {}
}

async function addForward() {
  try {
    await api('POST', '/forwards', {
      name: document.getElementById('fwdName').value,
      listen_port: parseInt(document.getElementById('fwdListenPort').value),
      target_host: document.getElementById('fwdTargetHost').value,
      target_port: parseInt(document.getElementById('fwdTargetPort').value),
      server_id: 0, protocol: 'tcp',
    });
    showMsg('fwdMsg', '添加成功');
    await loadForwards();
    await loadDashboard();
  } catch (e) { showMsg('fwdMsg', e.message, true); }
}

async function delForward(id) {
  if (!confirm('确认删除?')) return;
  try { await api('DELETE', '/forwards/' + id); await loadForwards(); await loadDashboard(); } catch (e) { alert(e.message); }
}

async function toggleForward(id) {
  try {
    const data = await api('POST', '/forwards/' + id + '/toggle');
    showMsg('fwdMsg', data.message);
    await loadForwards();
    await loadDashboard();
  } catch (e) { showMsg('fwdMsg', e.message, true); }
}

// SS
async function loadSSNodes() {
  try {
    const data = await api('GET', '/ss');
    const tbody = document.getElementById('ssList');
    tbody.innerHTML = data.map(n => `<tr>
      <td>${esc(n.server_name)}</td><td>${n.port}</td><td>${n.method}</td>
      <td><span class="badge ${n.status==='active'?'badge-green':'badge-gray'}">${n.status}</span></td>
      <td><button class="btn btn-red btn-sm" onclick="delSSNode(${n.id})">删除</button></td>
    </tr>`).join('');
  } catch (e) {}
}

async function deploySSNode() {
  const serverId = document.getElementById('ssServer').value;
  if (!serverId) { showMsg('ssMsg', '请选择落地机', true); return; }
  try {
    await api('POST', '/ss/deploy', {
      server_id: parseInt(serverId),
      port: parseInt(document.getElementById('ssPort').value),
      password: document.getElementById('ssPass').value,
    });
    showMsg('ssMsg', '部署中...');
    await loadSSNodes();
  } catch (e) { showMsg('ssMsg', e.message, true); }
}

async function delSSNode(id) {
  if (!confirm('确认删除SS节点?')) return;
  try { await api('DELETE', '/ss/' + id); await loadSSNodes(); await loadDashboard(); } catch (e) { alert(e.message); }
}

// Helpers
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function showMsg(id, msg, isErr) {
  const el = document.getElementById(id);
  el.className = 'msg ' + (isErr ? 'msg-err' : 'msg-ok');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

// Init
if (TOKEN) {
  api('GET', '/status').then(() => showApp()).catch(() => doLogout());
} 
</script>
</body>
</html>
